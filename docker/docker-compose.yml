services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - TP_DATABASE_URL=postgresql+asyncpg://tracepilot:tracepilot@db:5432/tracepilot
      - TP_REDIS_URL=redis://redis:6379/0
      - TP_LLM_PROVIDER=openai
      - TP_OPENAI_API_KEY=${OPENAI_API_KEY}
      - TP_OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - TP_OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - TP_GROK_API_KEY=${GROK_API_KEY}
      - TP_GROK_BASE_URL=${GROK_BASE_URL}
      - TP_GROK_MODEL=${GROK_MODEL:-grok-beta}
      - TP_OBSERVABILITY_PROVIDER=${OBSERVABILITY_PROVIDER:-langfuse}
      - TP_LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - TP_LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - TP_LANGFUSE_BASE_URL=http://langfuse:3000
      - TP_CELERY_BROKER_URL=redis://redis:6379/0
      - TP_CELERY_RESULT_BACKEND=redis://redis:6379/1
      - TP_CLEANUP_RETENTION_DAYS=90
      - TP_CLEANUP_BATCH_SIZE=500
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      langfuse:
        condition: service_healthy
    volumes:
      - ../app:/app/app:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tracepilot
      POSTGRES_PASSWORD: tracepilot
      POSTGRES_DB: tracepilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracepilot"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping || exit 1"]
      interval: 10s
      retries: 5
      start_period: 30s

  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://tracepilot:tracepilot@db:5432/tracepilot
      - CLICKHOUSE_URL=http://clickhouse:8123/default
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000/default
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=clickhouse
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-local-secret-change-in-production}
      - SALT=${LANGFUSE_SALT:-local-salt-change-in-production}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY:-local-encryption-change-in-production}
      - TELEMETRY_ENABLED=false
      - LANGFUSE_INIT_ORG_NAME=TracePilot
      - LANGFUSE_INIT_PROJECT_NAME=tracepilot
      - LANGFUSE_INIT_USER_EMAIL=admin@tracepilot.local
      - LANGFUSE_INIT_USER_NAME=Admin
      - LANGFUSE_INIT_USER_PASSWORD=${LANGFUSE_INIT_PASSWORD:-admin123}
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:

name: Model Drift Canary

on:
  push:
    branches: [main]

jobs:
  canary:
    runs-on: ubuntu-latest
    outputs:
      drift_detected: ${{ steps.check.outputs.drift_detected }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run canary suite
        id: run
        run: python scripts/canary_run.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          DATABASE_URL: postgresql+asyncpg://tracepilot:tracepilot@localhost:5432/tracepilot
          REDIS_URL: redis://localhost:6379/0
      - name: Check drift
        id: check
        run: python scripts/check_drift.py
      - name: Open issue on drift
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 Model Drift Detected",
              body: "The canary suite detected score drift. Please investigate the latest run.",
              labels: ["bug", "model-drift", "canary"]
            })

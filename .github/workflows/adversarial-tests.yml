name: Adversarial Tests

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  update-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Pull Langfuse dataset
        run: python scripts/pull_adversarial_tests.py
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      - name: Generate new test cases
        run: python scripts/generate_tests_from_errors.py
      - name: Create PR with new tests
        uses: peter-evans/create-pull-request@v5
        with:
          title: "chore: update adversarial test suite"
          commit-message: "chore: update adversarial test suite"
          branch: "chore/adversarial-tests"
          body: "Auto-generated test cases from Langfuse validation errors."

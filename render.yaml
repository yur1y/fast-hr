databases:
  - name: tracepilot-db
    plan: free
    databaseName: tracepilot
    user: tracepilot

services:
  - type: web
    name: tracepilot
    runtime: docker
    plan: free
    branch: main
    repo: https://github.com/<YOUR_USERNAME>/<YOUR_REPO>
    dockerfilePath: docker/Dockerfile.prod
    healthCheckPath: /health
    envVars:
      - key: TP_DATABASE_URL
        fromDatabase:
          name: tracepilot-db
          property: connectionString
      - key: TP_REDIS_URL
        fromService:
          name: tracepilot-redis
          type: redis
          property: connectionString
      - key: TP_LLM_PROVIDER
        value: openai
      - key: TP_OPENAI_API_KEY
        sync: false
      - key: TP_OPENAI_MODEL
        value: gpt-4o
      - key: TP_OBSERVABILITY_PROVIDER
        value: none
      - key: TP_DEBUG
        value: false
  - type: redis
    name: tracepilot-redis
    plan: free
